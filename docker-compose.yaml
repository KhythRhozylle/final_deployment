services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: florynnshop_root_password
      MYSQL_DATABASE: florynnshop_db
      MYSQL_USER: florynnshop_user
      MYSQL_PASSWORD: florynnshop_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - florynnshop_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPS: "1"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_URL: "http://127.0.0.1:${APP_PORT:-8000}"
      DATABASE_URL: "mysql://florynnshop_user:florynnshop_password@mysql:3306/florynnshop_db?serverVersion=8.0&charset=utf8mb4"
    env_file:
      - .env
      - .env.local
    volumes:
      - ./:/app
      - app_vendor:/app/vendor
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config:/app/config
      - ./src:/app/src
      - ./templates:/app/templates
      - ./public/uploads:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - florynnshop_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: florynnshop_user
      PMA_PASSWORD: florynnshop_password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - florynnshop_network

volumes:
  mysql_data:
  app_vendor:

networks:
  florynnshop_network:

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    images_directory: '%kernel.project_dir%/public/uploads/images'
    # Symfony env(default::VAR) passes null when unset — use explicit empty fallback for typed string args
    app.env_empty: ''
    # Safe default when MAILER_DSN is unset (avoids 60s SMTP connect timeouts on Railway)
    default_mailer_dsn: 'null://null'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/DataFixtures/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\AppUrlService:
        arguments:
            $appUrl: '%env(default:app.env_empty:APP_URL)%'
            $railwayPublicDomain: '%env(default:app.env_empty:RAILWAY_PUBLIC_DOMAIN)%'

    App\Service\ShopInfoService:
        arguments:
            $shopName: '%florynn.shop.name%'
            $shopHours: '%florynn.shop.hours%'
            $shopPhones: '%florynn.shop.phones%'
            $shopEmail: '%florynn.shop.email%'
            $shopAddress: '%florynn.shop.address%'
            $shopServices: '%florynn.shop.services%'

    App\EventSubscriber\RouterContextSubscriber:
        arguments:
            $kernelEnvironment: '%kernel.environment%'

    App\Service\EmailVerificationService:
        arguments:
            $fromEmail: '%env(default:app.env_empty:MAILER_FROM_EMAIL)%'
            $fromName: '%env(default:app.env_empty:MAILER_FROM_NAME)%'

    App\Service\GoogleIdTokenVerifier:
        arguments:
            $googleClientId: '%env(default:app.env_empty:GOOGLE_CLIENT_ID)%'

    # Custom Guzzle HTTP client with SSL certificate for OAuth2
    oauth2_http_client:
        class: GuzzleHttp\Client
        arguments:
            -
                verify: '%kernel.project_dir%/cacert.pem'
